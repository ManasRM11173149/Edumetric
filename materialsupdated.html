<!-- ===== MATERIALS TAB (UPDATED) ===== -->
<!-- Replace lines 510-551 in index.html with this updated section -->

<div id="materials" class="tab-content">
    <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 20px;">Generate Study Materials</h4>

    <div class="form-group">
        <label>Grade Level (K–12)</label>
        <select id="materialGrade" onchange="populateMaterialSubjects()">
            <option value="">-- Select Grade --</option>
        </select>
    </div>

    <!-- NEW: Subject Selector -->
    <div class="form-group">
        <label>Subject</label>
        <select id="materialSubject" onchange="populateMaterialTopics()">
            <option value="">-- Select a grade first --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Topic</label>
        <select id="materialTopic">
            <option value="">-- Select a subject first --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Material Type</label>
        <select id="materialType">
            <option>Study Guide</option>
            <option>Flashcards</option>
            <option>Practice Problems</option>
            <option>Summary Notes</option>
        </select>
    </div>

    <button class="btn-primary" onclick="generateMaterial()">Generate Material</button>

    <div id="generatedMaterial" class="material-output" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;">
            <h5 id="materialTitle" style="margin: 0;">Study Material</h5>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn-small" onclick="downloadMaterial('html')">⬇ Download (HTML)</button>
                <button class="btn-small" onclick="downloadMaterial('txt')">⬇ Download (TXT)</button>
                <button class="btn-small" onclick="printMaterial()">🖨 Print / PDF</button>
            </div>
        </div>
        <div class="material-body" id="materialContent"></div>
    </div>
</div>
